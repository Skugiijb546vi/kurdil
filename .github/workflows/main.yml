name: ناردنی ڤیدیۆ بۆ هۆگینگ فەیس

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینکی ڕاستەوخۆی MP4 لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فیلمەکە (بۆ نموونە: movie1.mp4)'
        required: true
        default: 'video.mp4'

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: داگرتنی ڤیدیۆ لە لینکەکەوە
        run: |
          curl -L -o temp_video.mp4 "${{ github.event.inputs.video_url }}"

      - name: ئامادەکردنی کتێبخانەی Hugging Face
        run: pip install huggingface_hub

      - name: ناردن بۆ Hugging Face
        env:
          HF_TOKEN: "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"
          REPO_ID: "Sarkoakram/sarko761"
        run: |
          python -c "from huggingface_hub import HfApi; api = HfApi(); api.upload_file(path_or_fileobj='temp_video.mp4', path_in_repo='${{ github.event.inputs.file_name }}', repo_id='${{ env.REPO_ID }}', repo_type='dataset', token='${{ env.HF_TOKEN }}')"
