name: Direct_To_HuggingFace_Fast
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link (Seedr)'
        required: true
      file_name:
        description: 'ناوی فایلەکە لەناو Hugging Face'
        required: true
        default: 'video_from_seedr.mp4'

jobs:
  upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Setup Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 -qq
          pip install -q huggingface_hub

      - name: ⬇️ Fast Download
        run: |
          # بەکارهێنانی aria2 بۆ داگرتنی خێرا ڕێک وەک کۆدەکەی خۆت
          aria2c --max-connection-per-server=16 --split=16 -o "video.mp4" "${{ github.event.inputs.video_url }}"

      - name: 🚀 Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          # وەرگرتنی تۆکن لە سێتیتنگس
          token = os.getenv('HF_TOKEN')
          if not token:
              print('❌ Error: HF_TOKEN is missing in GitHub Secrets!')
              exit(1)
              
          api = HfApi()
          repo_id = 'Sarko57/sarko987'
          file_name = '${{ github.event.inputs.file_name }}'
          
          print(f'📤 Sending to Hugging Face: {file_name}...')
          
          api.upload_file(
              path_or_fileobj='video.mp4',
              path_in_repo=file_name,
              repo_id=repo_id,
              repo_type='dataset',
              token=token
          )
          print('✅ Done! Check your Hugging Face repo.')
          "
